name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - feature
      - enhancement
  - title: 'Fixes'
    labels:
      - fix
      - bug
      - bugfix
  - title: 'Maintenance'
    labels:
      - chore
      - dependencies
      - ci

exclude-labels:
  - skip-changelog

exclude-contributors:
  - github-actions[bot]

autolabeler:
  - label: ci
    files:
      - '.github/workflows/*'
      - '.github/actions/**'
  - label: dependencies
    files:
      - 'package.json'
      - 'yarn.lock'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
no-changes-template: '- No user-facing changes in this release.'

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bug
      - bugfix
      - chore
      - dependencies
      - ci
  default: patch

template: |
  ## Changes

  $CHANGES
